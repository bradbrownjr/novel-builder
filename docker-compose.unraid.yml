services:
  novel-builder:
    image: ghcr.io/bradbrownjr/novel-builder:latest
    container_name: novel-builder
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /mnt/user/appdata/novel-builder/workspace:/app/workspace
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
