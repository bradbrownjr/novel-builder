services:
  novel-builder:
    image: ghcr.io/bradbrownjr/novel-builder:latest
    container_name: novel-builder
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /mnt/user/appdata/novel-builder:/workspace
    environment:
      - OLLAMA_HOST=http://YOUR_OLLAMA_HOST:11434
